<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="tela-inicial">
        <h1>Jogo da Velha</h1>
        <p>Escolha o modo de jogo:</p>
        <div id="escolha-modo">
            <button class="btn-modo" id="modo-ia">1 vs IA</button>
            <button class="btn-modo" id="modo-2p">2 vs 2</button>
        </div>
        <p>Escolha seu símbolo:</p>
        <div id="escolha">
            <button class="btn-simbolo" id="escolher-x">X</button>
            <button class="btn-simbolo" id="escolher-o">O</button>
        </div>
        <p>Escolha o tamanho do tabuleiro:</p>
        <div id="escolha-nivel">
            <button class="btn-nivel" id="nivel-facil">3x3</button>
            <button class="btn-nivel" id="nivel-medio">4x4</button>
            <button class="btn-nivel" id="nivel-dificil">5x5</button>
        </div>

        <!-- Dificuldade aparece só depois de escolher o tamanho (e modo IA) -->
        <p id="label-dificuldade" class="escondido">Escolha a dificuldade:</p>
        <div id="escolha-dificuldade" class="escondido">
            <button class="btn-dific" id="dific-facil">Fácil</button>
            <button class="btn-dific" id="dific-medio">Médio</button>
            <button class="btn-dific" id="dific-dificil">Difícil</button>
        </div>
        <button id="btn-comecar" disabled>Começar Jogo</button>
    </div>

    <div id="tela-jogo" class="escondido">
        <h1>Jogo da Velha</h1>

        <div id="placar">
            <div class="placar-item">
                <span id="nome-jogador1">Jogador X</span>
                <span id="pontos-x">0</span>
            </div>
            <div class="placar-item">
                <span>Empates</span>
                <span id="pontos-empate">0</span>
            </div>
            <div class="placar-item">
                <span id="nome-jogador2">Jogador O</span>
                <span id="pontos-o">0</span>
            </div>
        </div>

        <p id="status">Vez do jogador X</p>

        <div id="tabuleiro">
            <div class="celula" data-index="0"></div>
            <div class="celula" data-index="1"></div>
            <div class="celula" data-index="2"></div>
            <div class="celula" data-index="3"></div>
            <div class="celula" data-index="4"></div>
            <div class="celula" data-index="5"></div>
            <div class="celula" data-index="6"></div>
            <div class="celula" data-index="7"></div>
            <div class="celula" data-index="8"></div>
        </div>

        <div id="botoes">
            <button id="reiniciar">Reiniciar Partida</button>
            <button id="menu">Voltar ao Menu</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
